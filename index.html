<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nova Clean | Inicio</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Inter',sans-serif;}

body{
background:#0f172a;
color:white;
}

/* NAV */
.header{
position:fixed;
top:0;
width:100%;
background:rgba(15,23,42,0.9);
backdrop-filter:blur(10px);
border-bottom:1px solid rgba(255,255,255,0.08);
z-index:100;
}

.nav{
max-width:1200px;
margin:auto;
display:flex;
justify-content:space-between;
align-items:center;
padding:18px;
}

.nav a{
color:#cbd5e1;
text-decoration:none;
margin:0 15px;
font-size:14px;
}

.nav a.active,
.nav a:hover{color:white;}

.btn{
padding:10px 18px;
border-radius:25px;
background:rgba(255,255,255,0.08);
border:1px solid rgba(255,255,255,0.15);
color:white;
text-decoration:none;
}

/* HERO */
.hero{
height:100vh;
display:flex;
align-items:center;
background:url('https://images.unsplash.com/photo-1583947215259-38e31be8751f?q=80&w=1600') center/cover;
position:relative;
}

.hero::after{
content:"";
position:absolute;
inset:0;
background:linear-gradient(90deg,#020617 20%,transparent 70%);
}

.hero-content{
position:relative;
max-width:1200px;
margin:auto;
padding:20px;
}

.hero h1{
font-size:64px;
font-weight:800;
line-height:1;
}

.hero span{
display:block;
background:linear-gradient(90deg,#cbd5e1,#ffffff);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.hero p{
margin-top:20px;
color:#94a3b8;
font-size:18px;
max-width:600px;
}

.hero-buttons{
margin-top:30px;
display:flex;
gap:15px;
}

.btn-primary{
background:white;
color:#0f172a;
font-weight:600;
}

.btn-secondary{
background:rgba(255,255,255,0.08);
}

/* PRODUCTOS */
.section{
background:#f1f5f9;
color:#0f172a;
padding:80px 20px;
}

.container{
max-width:1200px;
margin:auto;
}

.grid{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:20px;
}

.card{
background:white;
border-radius:20px;
overflow:hidden;
box-shadow:0 10px 30px rgba(0,0,0,0.1);
transition:0.3s;
}

.card:hover{
transform:translateY(-8px);
}

.card img{
width:100%;
height:200px;
object-fit:cover;
}

.card-content{
padding:20px;
}

.card h3{
margin-bottom:10px;
}

.card button{
padding:10px 15px;
border:none;
background:#0f172a;
color:white;
border-radius:20px;
cursor:pointer;
}

/* RESPONSIVE */
@media(max-width:900px){
.grid{grid-template-columns:1fr;}
.hero h1{font-size:40px;}
}
</style>
</head>

<body>

<!-- NAV -->
<div class="header">
  <div class="nav">
    <strong>NOVA CLEAN</strong>

    <div>
      <a href="index.html" class="active">Inicio</a>
      <a href="productos.html">Productos</a>
      <a href="carrito.html">Carrito</a>
    </div>

    <a href="carrito.html" class="btn">Ver Carrito</a>
  </div>
</div>

<!-- HERO CORRECTO (PRODUCTOS) -->
<section class="hero">
  <div class="hero-content">
    <h1>
      Productos de limpieza
      <span>profesionales</span>
    </h1>

    <p>
      Venta directa de productos para hogar, industria y comercio.
    </p>

    <div class="hero-buttons">
      <a href="productos.html" class="btn btn-primary">Ver productos</a>
      <a href="carrito.html" class="btn btn-secondary">Ver carrito</a>
    </div>
  </div>
</section>

<!-- PRODUCTOS -->
<section class="section">
  <div class="container">

    <h2>Nuestros productos</h2>

    <div class="grid">

      <div class="card">
        <img src="https://images.unsplash.com/photo-1585421514738-01798e348b17">
        <div class="card-content">
          <h3>Limpieza Hogar</h3>
          <button onclick="location.href='productos.html'">Ver más</button>
        </div>
      </div>

      <div class="card">
        <img src="https://images.unsplash.com/photo-1603712725038-e9334ae8f39f">
        <div class="card-content">
          <h3>Limpieza Industrial</h3>
          <button onclick="location.href='productos.html'">Ver más</button>
        </div>
      </div>

      <div class="card">
        <img src="https://images.unsplash.com/photo-1584305574647-0cc949a2bb9f">
        <div class="card-content">
          <h3>Higiene Personal</h3>
          <button onclick="location.href='productos.html'">Ver más</button>
        </div>
      </div>

      <div class="card">
        <img src="https://images.unsplash.com/photo-1596462502278-27bfdc403348">
        <div class="card-content">
          <h3>Desechables</h3>
          <button onclick="location.href='productos.html'">Ver más</button>
        </div>
      </div>

    </div>

  </div>
</section>

</body>
</html>
