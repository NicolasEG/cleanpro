<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nova Clean | Productos</title>

<style>
body{font-family:Arial;margin:0;background:#f5f5f5;}
.container{max-width:1200px;margin:auto;padding:20px;}
.nav{display:flex;gap:30px;background:#111;padding:20px;}
.nav a{color:white;text-decoration:none;}
.active{font-weight:bold;}

.grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:20px;
}

.card{
background:white;
padding:20px;
border-radius:10px;
}

button{
margin-top:10px;
padding:10px;
cursor:pointer;
}
</style>
</head>

<body>

<nav class="nav">
<a href="index.html">Inicio</a>
<a href="productos.html" class="active">Productos</a>
<a href="carrito.html">Carrito</a>
</nav>

<div class="container">

<h2>Productos</h2>

<div class="grid">

<div class="card">
<h3>Lavandina</h3>
<p>$4500</p>
<button onclick="add(1,'Lavandina',4500)">Agregar</button>
</div>

<div class="card">
<h3>Detergente</h3>
<p>$6200</p>
<button onclick="add(2,'Detergente',6200)">Agregar</button>
</div>

<div class="card">
<h3>Jabón</h3>
<p>$3900</p>
<button onclick="add(3,'Jabón',3900)">Agregar</button>
</div>

</div>

</div>

<script>
function getCart(){
return JSON.parse(localStorage.getItem("cart")||"[]")
}

function saveCart(c){
localStorage.setItem("cart",JSON.stringify(c))
}

function add(id,name,price){
let c=getCart()
let p=c.find(x=>x.id==id)

if(p){p.qty++}
else{c.push({id,name,price,qty:1})}

saveCart(c)
alert("Agregado al carrito")
}
</script>

</body>
</html>
